<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>US CS 日报索引</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh}
header{background:linear-gradient(135deg,#1e3a8a,#1e40af);color:#fff;padding:20px 32px}
header h1{font-size:1.4rem;font-weight:700}
header p{font-size:.85rem;opacity:.75;margin-top:4px}
.container{max-width:640px;margin:32px auto;padding:0 16px}
.list{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden}
.item{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #f1f5f9;text-decoration:none;color:inherit;transition:background .15s}
.item:last-child{border-bottom:none}
.item:hover{background:#f8fafc}
.date{font-weight:600;font-size:.95rem}
.day{font-size:.78rem;color:#64748b;margin-top:2px}
.arrow{color:#94a3b8;font-size:1.1rem}
</style>
</head>
<body>
<header>
  <h1>📊 US CS 日报索引</h1>
  <p>Customer Service Daily Reports</p>
</header>
<div class="container">
  <div class="list" id="list"></div>
</div>
<script>
const reports = ["2026-06-04","2026-06-03","2026-06-02","2026-06-01","2026-05-31","2026-05-30","2026-05-29","2026-05-28","2026-05-27","2026-05-26","2026-05-25","2026-05-24","2026-05-23","2026-05-22","2026-05-21","2026-05-20","2026-05-19","2026-05-18","2026-05-17","2026-05-16","2026-05-15","2026-05-14"];
const days = ['周日','周一','周二','周三','周四','周五','周六'];
const list = document.getElementById('list');
reports.forEach(d => {
  const dt = new Date(d + 'T00:00:00');
  const a = document.createElement('a');
  a.className = 'item';
  a.href = `daily-${d}.html`;
  a.innerHTML = `<div><div class="date">${d}</div><div class="day">${days[dt.getDay()]}</div></div><span class="arrow">›</span>`;
  list.appendChild(a);
});
</script>
</body>
</html>
